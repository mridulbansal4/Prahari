# Prahari — production store topology (Bible §12.1, §3.9).
# The default `embedded` profile needs NONE of this (ADR-P01); this compose file brings up the
# full polyglot-persistence stack for `PRAHARI_PROFILE=production`.
# Postgres is published on host 5433 to avoid colliding with a locally-installed Postgres on 5432.

services:
  neo4j:
    image: neo4j:5.20-community
    environment:
      NEO4J_AUTH: neo4j/sentinel-dev
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j-data:/data"]
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "sentinel-dev", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports: ["6333:6333"]
    volumes: ["qdrant-data:/qdrant/storage"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel-dev
      POSTGRES_DB: sentinel
    ports: ["5433:5432"]
    volumes: ["pg-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]

  backend:
    build: ./backend
    environment:
      PRAHARI_PROFILE: production
      PRAHARI_GRAPH_URI: bolt://neo4j:7687
      PRAHARI_GRAPH_USER: neo4j
      PRAHARI_GRAPH_PASSWORD: sentinel-dev
      PRAHARI_VECTOR_URL: http://qdrant:6333
      PRAHARI_PG_DSN: postgresql://sentinel:sentinel-dev@postgres:5432/sentinel
      PRAHARI_REDIS_URL: redis://redis:6379/0
      # PRAHARI_MODEL_API_KEY: set to enable the cloud reasoning provider (CP-5); unset =
      # air-gap/local + template-synth fallback (CP-9).
    depends_on:
      neo4j: {condition: service_healthy}
      postgres: {condition: service_healthy}
      qdrant: {condition: service_started}
      redis: {condition: service_started}
    ports: ["8000:8000"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    ports: ["5173:80"]
    depends_on: [backend]

volumes:
  neo4j-data:
  qdrant-data:
  pg-data:
  redis-data:
